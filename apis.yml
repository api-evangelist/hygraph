apis:
  - aid: hygraph:graphql-content-api
    name: Hygraph GraphQL Content API
    description: "Native GraphQL API that auto-generates queries, mutations, and real-time subscriptions from the project content schema. Supports content federation, multi-environment delivery, and a high-performance CDN cache endpoint for published content."
